<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning SMP Islam Moetiah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
    <style>
        /* ===== CSS SAMA SEPERTI SEBELUMNYA ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background:#f4f7fc; min-height:100vh; color:#1e293b; display:flex; flex-direction:column; }
        #loginPage { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#0f2b4b,#1a3a5f); padding:20px; }
        .login-box { background:#fff; padding:40px 36px; border-radius:24px; max-width:400px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center; }
        .login-box .logo-icon { font-size:60px; color:#0f2b4b; margin-bottom:10px; }
        .login-box h2 { color:#0f2b4b; margin-bottom:4px; }
        .login-box p.sub { color:#64748b; font-size:14px; margin-bottom:24px; }
        .login-box .form-group { text-align:left; margin-bottom:16px; }
        .login-box .form-group label { display:block; font-weight:600; font-size:13px; color:#334155; margin-bottom:4px; }
        .login-box .form-group input { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; }
        .login-box .form-group input:focus { outline:none; border-color:#0f2b4b; box-shadow:0 0 0 3px rgba(15,43,75,0.08); }
        .login-box .btn-login { width:100%; padding:12px; background:#0f2b4b; color:#fff; border:none; border-radius:10px; font-weight:700; font-size:16px; cursor:pointer; transition:0.2s; }
        .login-box .btn-login:hover { background:#1a3a5f; }
        .login-box .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
        .login-error { color:#dc2626; font-size:13px; margin-top:8px; display:none; }
        /* ===== SIDEBAR, MAIN, CARD, TABLE, FORM, TOAST, MODAL, RESPONSIVE ===== */
        /* ... (salin semua CSS dari kode sebelumnya) ... */
        /* Agar tidak terlalu panjang, saya singkat dengan CSS yang sudah lengkap di jawaban sebelumnya */
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <h2>E-Learning SMP Islam Moetiah</h2>
        <p class="sub">Masuk ke dashboard</p>
        <form id="loginForm">
            <div class="form-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Masukkan username" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Masukkan password" required></div>
            <div id="loginError" class="login-error"></div>
            <button type="submit" class="btn-login" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
        </form>
    </div>
</div>
